apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: docker.io/bitnami/spark:3.5
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/bitnami/spark/examples/src/main/python/pi.py
  sparkVersion: 3.5.0
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark-operator
  executor:
    cores: 1
    instances: 2
    memory: "512m"